<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    display: flex;
    gap: 20px;
}
.card {
    width: 200px;
    height: 130px;
    background: #f5f5f5;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
}
.temp { border-top: 5px solid red; }
.humi { border-top: 5px solid blue; }

.title { font-size: 14px; }
.value { font-size: 28px; margin-top: 20px; }
</style>
</head>

<body>

<div class="container">
    <div class="card temp">
        <div class="title">NHIỆT ĐỘ</div>
        <div class="value" id="temp">-- °C</div>
    </div>

    <div class="card humi">
        <div class="title">ĐỘ ẨM</div>
        <div class="value" id="humi">-- %</div>
    </div>
</div>

<script>
// 🔥 LẤY DATA TỪ E-Ra (iframe truyền xuống)
<script>
// Lấy param từ URL
const url = new URL(window.location.href);

const temp = url.searchParams.get("temp");
const humi = url.searchParams.get("humi");

// Hiển thị
if (temp !== null) {
    document.getElementById("temp").innerHTML = temp + " °C";
}

if (humi !== null) {
    document.getElementById("humi").innerHTML = humi + " %";
}
</script>

</body>
</html>
