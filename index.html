<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IoT Dashboard</title>

<!-- ✅ Script chuẩn (fix 502) -->
<script src="https://unpkg.com/@eohjsc/era-widget@latest/src/index.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    display: flex;
    gap: 20px;
}

.card {
    width: 200px;
    height: 130px;
    background: #f5f5f5;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.temp { border-top: 5px solid red; }
.humi { border-top: 5px solid blue; }

.title {
    font-size: 14px;
    color: #555;
}

.value {
    font-size: 28px;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <div class="card temp">
        <div class="title">NHIỆT ĐỘ</div>
        <div class="value" id="temp">-- °C</div>
    </div>

    <div class="card humi">
        <div class="title">ĐỘ ẨM</div>
        <div class="value" id="humi">-- %</div>
    </div>
</div>

<script>
// 🔥 Đợi load xong tránh lỗi 502
window.onload = function () {

    eraWidget.init({

        onConfiguration: function(config) {
            console.log("Config:", config);
        },

        onValues: function(values) {
            console.log("Values:", values);

            // 👉 ID 1 = V1
            if (values[1] && values[1].value !== undefined) {
                document.getElementById("temp").innerHTML =
                    parseInt(values[1].value) + " °C";
            }

            // 👉 ID 2 = V2
            if (values[2] && values[2].value !== undefined) {
                document.getElementById("humi").innerHTML =
                    parseInt(values[2].value) + " %";
            }
        }

    });

};
</script>

</body>
</html>
