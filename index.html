<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@eohjsc/era-widget@latest/src/index.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    display: flex;
    gap: 20px;
}

.card {
    width: 200px;
    height: 130px;
    background: #f5f5f5;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
}

.temp { border-top: 5px solid red; }
.humi { border-top: 5px solid blue; }

.value {
    font-size: 28px;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <div class="card temp">
        <div>NHIỆT ĐỘ</div>
        <div class="value" id="temp">-- °C</div>
    </div>

    <div class="card humi">
        <div>ĐỘ ẨM</div>
        <div class="value" id="humi">-- %</div>
    </div>
</div>

<script>
window.onload = function () {

    eraWidget.init({

        onValues: function(values) {
            console.log("Values:", values);

            // 🔥 LẤY KEY ĐỘNG
            const keys = Object.keys(values);

            if (keys.length >= 2) {
                const tempValue = values[keys[0]].value;
                const humiValue = values[keys[1]].value;

                document.getElementById("temp").innerHTML =
                    parseInt(tempValue) + " °C";

                document.getElementById("humi").innerHTML =
                    parseInt(humiValue) + " %";
            }
        }

    });

};
</script>

</body>
</html>
