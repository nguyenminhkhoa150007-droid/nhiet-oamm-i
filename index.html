<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #dcdcdc;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    display: flex;
    gap: 40px;
}

.card {
    width: 280px;
    height: 180px;
    background: #e6e6e6;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    padding: 20px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.temp {
    border-top: 6px solid #ff4d5a;
}

.humi {
    border-top: 6px solid #2d89ef;
}

.title {
    font-size: 20px;
    color: #444;
}

.value {
    font-size: 42px;
    margin-top: 30px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <div class="card temp">
        <div class="title">NHIỆT ĐỘ</div>
        <div class="value" id="temp">-- °C</div>
    </div>

    <div class="card humi">
        <div class="title">ĐỘ ẨM</div>
        <div class="value" id="humi">-- %</div>
    </div>
</div>

<script>
// 🔥 TOKEN của bạn
const TOKEN = "539c1dc1-70ed-43fc-b028-37e6af097ac7";

// MQTT WebSocket E-Ra
const client = mqtt.connect("wss://mqtt.eoh.io:8084/mqtt", {
    username: TOKEN,
    password: ""
});

// Topic
const topic = `era/${TOKEN}/data`;

client.on("connect", () => {
    console.log("✅ Connected to E-Ra");
    client.subscribe(topic);
});

// Nhận dữ liệu realtime
client.on("message", (topic, message) => {
    try {
        const data = JSON.parse(message.toString());

        console.log(data);

        if (data.V1 !== undefined) {
            document.getElementById("temp").innerHTML =
                data.V1.toFixed(1) + " °C";
        }

        if (data.V2 !== undefined) {
            document.getElementById("humi").innerHTML =
                data.V2.toFixed(1) + " %";
        }

    } catch (e) {
        console.log("Lỗi:", message.toString());
    }
});
</script>

</body>
</html>
