<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Layout */
.container {
    display: flex;
    gap: 20px;
}

/* Card */
.card {
    width: 220px;
    height: 180px;
    background: linear-gradient(145deg, #ffffff, #e6e6e6);
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Title */
.title {
    font-size: 14px;
    color: #666;
}

/* Value */
.value {
    font-size: 32px;
    margin-top: 10px;
    font-weight: bold;
}

/* Progress bar */
.bar {
    width: 100%;
    height: 10px;
    background: #ddd;
    border-radius: 10px;
    margin-top: 15px;
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0%;
    transition: 0.5s;
}

/* Colors */
#temp-fill { background: red; }
#humi-fill { background: blue; }

/* Status */
.status {
    margin-top: 10px;
    font-size: 13px;
    color: #444;
}
</style>
</head>

<body>

<div class="container">

    <!-- 🌡️ Nhiệt độ -->
    <div class="card" id="card-temp">
        <div class="title">🌡️ NHIỆT ĐỘ</div>
        <div class="value" id="nhietDo">-- °C</div>

        <div class="bar">
            <div class="fill" id="temp-fill"></div>
        </div>

        <div class="status" id="temp-status">--</div>
    </div>

    <!-- 💧 Độ ẩm -->
    <div class="card" id="card-humi">
        <div class="title">💧 ĐỘ ẨM</div>
        <div class="value" id="doAm">-- %</div>

        <div class="bar">
            <div class="fill" id="humi-fill"></div>
        </div>

        <div class="status" id="humi-status">--</div>
    </div>

</div>

<script>
// DOM
const tempEl = document.getElementById('nhietDo');
const humiEl = document.getElementById('doAm');

const tempFill = document.getElementById('temp-fill');
const humiFill = document.getElementById('humi-fill');

const tempStatus = document.getElementById('temp-status');
const humiStatus = document.getElementById('humi-status');

// config
let configTemp = null;
let configHumi = null;

const eraWidget = new EraWidget();

eraWidget.init({
    needRealtimeConfigs: true,

    onConfiguration: (config) => {
        configTemp = config.realtime_configs[0];
        configHumi = config.realtime_configs[1];
    },

    onValues: (values) => {

        // 🌡️ NHIỆT ĐỘ
        if (configTemp && values[configTemp.id]) {
            const t = parseInt(values[configTemp.id].value);

            tempEl.innerHTML = t + " °C";

            // Progress (0-50°C)
            tempFill.style.width = (t * 2) + "%";

            // Màu + trạng thái
            if (t < 25) {
                tempFill.style.background = "blue";
                tempStatus.innerHTML = "Lạnh ❄️";
            } else if (t < 32) {
                tempFill.style.background = "orange";
                tempStatus.innerHTML = "Bình thường 👍";
            } else {
                tempFill.style.background = "red";
                tempStatus.innerHTML = "Nóng 🔥";
            }
        }

        // 💧 ĐỘ ẨM
        if (configHumi && values[configHumi.id]) {
            const h = parseInt(values[configHumi.id].value);

            humiEl.innerHTML = h + " %";

            humiFill.style.width = h + "%";

            if (h < 40) {
                humiStatus.innerHTML = "Khô 🌵";
            } else if (h < 70) {
                humiStatus.innerHTML = "Ổn định 👍";
            } else {
                humiStatus.innerHTML = "Ẩm cao 💧";
            }
        }
    }
});
</script>

</body>
</html>
