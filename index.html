<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Dashboard</title>

<style>
body {
    font-family: Arial;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    display: flex;
    gap: 20px;
}

.card {
    width: 200px;
    height: 130px;
    background: #f5f5f5;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
}

.temp { border-top: 5px solid red; }
.humi { border-top: 5px solid blue; }

.title { font-size: 14px; }
.value { font-size: 28px; margin-top: 20px; }
</style>
</head>

<body>

<div class="container">
    <div class="card temp">
        <div class="title">NHIỆT ĐỘ</div>
        <div class="value" id="temp">-- °C</div>
    </div>

    <div class="card humi">
        <div class="title">ĐỘ ẨM</div>
        <div class="value" id="humi">-- %</div>
    </div>
</div>

<script>
// 🔥 TOKEN của bạn
const TOKEN = "539c1dc1-70ed-43fc-b028-37e6af097ac7";

// API E-Ra
const API = `https://api.eoh.io/v1/device/latest?token=${TOKEN}`;

// Lấy dữ liệu mỗi 3 giây
async function getData() {
    try {
        const res = await fetch(API);
        const data = await res.json();

        console.log(data);

        if (data.V1 !== undefined) {
            document.getElementById("temp").innerHTML =
                data.V1 + " °C";
        }

        if (data.V2 !== undefined) {
            document.getElementById("humi").innerHTML =
                data.V2 + " %";
        }

    } catch (e) {
        console.log("Lỗi API:", e);
    }
}

// chạy liên tục
setInterval(getData, 3000);
getData();
</script>

</body>
</html>
