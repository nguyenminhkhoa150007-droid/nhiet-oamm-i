<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    display: flex;
    gap: 20px;
}

.card {
    width: 200px;
    height: 140px;
    background: #f5f5f5;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
}

#card-temp { border-top: 5px solid red; }
#card-humi { border-top: 5px solid blue; }

.value {
    font-size: 28px;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="card" id="card-temp">
        <div>NHIỆT ĐỘ</div>
        <div class="value" id="nhietDo">-- °C</div>
    </div>

    <div class="card" id="card-humi">
        <div>ĐỘ ẨM</div>
        <div class="value" id="doAm">-- %</div>
    </div>

</div>

<script>
//  LẤY ELEMENT
const temp = document.getElementById('nhietDo');
const humi = document.getElementById('doAm');

//  BIẾN LƯU CONFIG
let configTemp = null;
let configHumi = null;

//  KHỞI TẠO
const eraWidget = new EraWidget();

eraWidget.init({
    needRealtimeConfigs: true,

    onConfiguration: (configuration) => {
        console.log("Config:", configuration);

        //  Map theo thứ tự bạn setup trong E-Ra
        configTemp = configuration.realtime_configs[0];
        configHumi = configuration.realtime_configs[1];
    },

    onValues: (values) => {
        console.log("Values:", values);

        //  Check tránh lỗi undefined
        if (configTemp && values[configTemp.id]) {
            const valueTemp = values[configTemp.id].value;

            temp.innerHTML = parseInt(valueTemp) + ' °C';
        }

        if (configHumi && values[configHumi.id]) {
            const valueHumi = values[configHumi.id].value;

            humi.innerHTML = parseInt(valueHumi) + ' %';
        }
    }
});
</script>

</body>
</html>
