<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.6/src/index.js"></script>

<style>
body {
    font-family: Arial;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    display: flex;
    gap: 20px;
}

.card {
    width: 200px;
    height: 130px;
    background: #f5f5f5;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
}

.temp { border-top: 5px solid red; }
.humi { border-top: 5px solid blue; }

.value {
    font-size: 28px;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <div class="card temp">
        <div>NHIỆT ĐỘ</div>
        <div class="value" id="temp">-- °C</div>
    </div>

    <div class="card humi">
        <div>ĐỘ ẨM</div>
        <div class="value" id="humi">-- %</div>
    </div>
</div>

<script>
// 🔥 KHỞI TẠO ERA WIDGET
eraWidget.init({

    onConfiguration: (config) => {
        console.log("Config:", config);
    },

    onValues: (values) => {
        console.log("Values:", values);

        // 👉 LẤY GIÁ TRỊ
        // ID 1 = V1
        // ID 2 = V2

        if (values[1]) {
            document.getElementById("temp").innerHTML =
                values[1].value + " °C";
        }

        if (values[2]) {
            document.getElementById("humi").innerHTML =
                values[2].value + " %";
        }
    }

});
</script>

</body>
</html>
