<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    display: flex;
    gap: 20px;
}
.card {
    width: 200px;
    height: 130px;
    background: #f5f5f5;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
}
.temp { border-top: 5px solid red; }
.humi { border-top: 5px solid blue; }

.value { font-size: 28px; margin-top: 20px; }
</style>
</head>

<body>

<div class="container">
    <div class="card temp">
        <div>NHIỆT ĐỘ</div>
        <div class="value" id="temp">-- °C</div>
    </div>

    <div class="card humi">
        <div>ĐỘ ẨM</div>
        <div class="value" id="humi">-- %</div>
    </div>
</div>

<script>
// 🔥 NHẬN DATA TỪ E-Ra iframe
window.addEventListener("message", (event) => {
    try {
        const data = event.data;

        console.log("DATA:", data);

        if (data.V1 !== undefined) {
            document.getElementById("temp").innerHTML =
                data.V1 + " °C";
        }

        if (data.V2 !== undefined) {
            document.getElementById("humi").innerHTML =
                data.V2 + " %";
        }

    } catch (e) {
        console.log("Lỗi:", e);
    }
});
</script>

</body>
</html>
